name: Bug report
description: Report a reproducible defect in the repository.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include the exact entrypoint, environment, and validation details.
  - type: input
    id: area
    attributes:
      label: Area
      description: Which part is affected?
      placeholder: deploy/docker, deploy/native, scripts/workflows, scripts/orthanc, docs
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or steps
      description: Exact command or precise reproduction steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Docker/native path, and any relevant context.
    validations:
      required: true
